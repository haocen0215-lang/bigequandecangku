---
变量更新规则:
  世界:
    当前日期:
      format: ${绿涨历}-${月/日}-${周几}
      check:
        - 每次事件推进、休息或旅行后更新，保持时间流逝合理
        - 若场景跳转跨度较大，应说明跳跃原因
    当前时间:
      check:
        - 随剧情推进递增，单次通常推进 10分钟~3小时
        - 经营快进时可一次性推进最多48小时并同步更新日期
    天气:
      check:
        - 随时间、季节、地理位置变化而更新
        - 若剧情需要戏剧性天气（暴雨/暴雪等），应给出符合季节的解释
    当前位置:
      check:
        - 随角色移动更新，格式为「城市 · 区域 · 具体地点」
        - 优先反映玩家所在位置
    声望:
      check:
        - 随完成重要事件、与势力互动、顾客口碑变化而调整
        - 声望变化通常为缓慢累积，单次调整不超过一个层级
    金钱:
      type: |-
        {
          秘银币: number;
          铂金币: number;
          金币: number;
          银币: number;
          铜币: number;
        }
      check:
        - 收入（卖菜、客房、客人付账）时增加对应钱币，支出（采购原料、维修、赔偿）时扣除
        - 累计总计超过进位阈值时应进位（1000铜=1银，100银=1金，等等）
        - 记账时优先使用高面额钱币减少零钱数量

  酒馆:
    名称:
      check:
        - 仅在酒馆改名（极罕见）时更新，日常剧情不修改
    所在城市:
      check:
        - 仅在酒馆搬迁（极罕见）时更新
    整体风格:
      check:
        - 仅在大型翻修或改建时更新
    区域列表:
      type: |-
        {
          [区域名: string]: {
            状态: string;
            描述: string;
            设施标签: string[];
            子空间?: {
              [子空间名: string]: {
                状态: string;
                描述: string;
              }
            };
          }
        }
      check:
        - 区域状态随使用、打扫、维修、损坏等变化
        - 子空间的入住/空闲状态随客人到达/离开而变化
        - 描述和设施标签仅在大修、改建或剧情重要变化时更新
    进行中的制作:
      type: |-
        {
          [制作名: string]: {
            容器: string;
            所在区域: string;
            当前状态: string;
            开始: string;
            预计完成: string;
            剩余量感: string;
          }
        }
      check:
        - 新建制作项目时插入新条目
        - 制作完成后更新状态为「已完成」，剩余量感同步更新
        - 时间流逝时根据工艺节奏缩短剩余量感
        - 取出成品后移除对应条目

  库存:
    type: |-
      {
        [物品名: string]: {
          数量: number;
          单位: string;
          分类: '食材' | '调料' | '成品' | '其他';
          售价铜币?: number;
          风味标签?: string[];
          烹饪手法?: string;
        }
      }
    check:
      - 购入、采集、制作完成时增加数量
      - 消耗（做菜、上菜、日常使用）时减少数量
      - 数量归零后可移除或置零由 AI 自行判断
      - 新做菜品应补充风味标签和烹饪手法
      - 食材、调料增加时数量应为整数；成品可按「份」计量

  购物:
    店铺列表:
      type: |-
        {
          [店铺名: string]: {
            所在位置: string;
            描述: string;
            商品列表: {
              [商品名: string]: {
                分类: '食材' | '调料' | '成品' | '其他';
                单位: string;
                单价铜币: number;
                备注?: string;
              }
            };
          }
        }
      check:
        - 仅当玩家实际到达某市场/店铺时才插入或更新对应店铺条目
        - 商品价格随剧情经济波动可微调
        - 不必要的店铺可在远离后移除

  账本:
    经营足迹:
      type: |-
        {
          累计营业天数: number;
          累计接待客人数: number;
          累计客房入住: number;
        }
      check:
        - 每过一日营业（非休息日）营业天数 +1
        - 每接待一批客人（无论是否住宿）客人数按实际增加
        - 每次客房有人入住退房后客房入住数 +1
    金银流转:
      累计总收入铜币:
        type: number
        check:
          - 每次上菜结账或其他收入后将对应铜币加到此项
          - 仅记录收入，支出不在本项中扣除
    当前总资产:
      type: |-
        {
          秘银币: number;
          铂金币: number;
          金币: number;
          银币: number;
          铜币: number;
          折算合计铜币: number;
        }
      check:
        - 钱币计数随每次收支同步更新
        - 折算合计铜币应始终等于各币种按进位换算后的总和

  玩家:
    基本信息:
      type: |-
        {
          姓名: string;
          种族: string;
          年龄: number;
          头像: string;
          称号: string;
          简介标语: string;
        }
      check:
        - 姓名、种族一般不更改
        - 称号随声望或重大成就变化
        - 年龄随剧情中度过重要时间节点（如跨年）时更新
    状态:
      生命值:
        type: |-
          {
            当前: number;
            上限: number;
          }
        range: 0~9999
        check:
          - 受伤时减少，休息/治疗时恢复
          - 上限可通过锻炼或体质提升缓慢增加
          - 当前不应超过上限
      精力:
        type: |-
          {
            当前: number;
            上限: number;
          }
        range: 0~9999
        check:
          - 劳作、战斗、赶路等消耗精力，休息/进食恢复
          - 上限可通过锻炼或体质提升缓慢增加
    烹饪等级:
      type: |-
        {
          等级: number;
          等级称号: string;
          下一级称号: string;
          累计做菜次数: number;
          升级所需次数: number;
        }
      check:
        - 每次做菜后累计次数 +1
        - 累计次数达到升级所需次数时等级 +1，称号和下一级称号随之更新
        - 升级所需次数随等级提升可适当增长
    当前穿着:
      check:
        - 换装、衣物损坏、特殊场合换衣时更新
        - 描述包含颜色、材质、款式等细节

  角色:
    type: |-
      {
        [角色id: string]: {
          显示名: string;
          种族: string;
          年龄: number;
          性别: '男' | '女' | '其他';
          当前位置: string;
          头像: string;
          简介标语: string;
          穿着: string;
          精力状态: string;
          膀胱值: {
            当前: number;
            上限: number;
          };
          亲密度阶段: number;
          亲密度描述: string;
          好感度: {
            当前: number;
            上限: number;
          };
        }
      }
    check:
      - 新 NPC 出场时插入新角色条目
      - 精力状态随剧情中角色的劳作/休息/战斗而更新
      - 膀胱值随时间流逝和饮水缓慢上升，如厕后重置
      - 好感度根据角色对<user>行为的感知和反应调整 ±(3~8)，仅在角色当前察觉到<user>时才更新
      - 亲密度阶段在好感度突破阶段阈值（20/40/60/80）时升级，亲密度描述随之更新
      - 穿着随换装/剧情变化更新
      - 当前位置随角色移动更新
