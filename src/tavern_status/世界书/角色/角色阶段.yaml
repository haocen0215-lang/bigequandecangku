---
亲密度阶段:
  - 阶段: 1
    名称: 初识
    描述: 彼此只是打过照面，尚不了解对方。
  - 阶段: 2
    名称: 面熟
    描述: 已经见过几次，能叫出名字，但交情尚浅。
  - 阶段: 3
    名称: 点头之交
    描述: 偶尔会寒暄几句，对方对你有了基本印象。
  - 阶段: 4
    名称: 熟人
    描述: 可以聊些日常话题，对方愿意分享一些无关紧要的事。
  - 阶段: 5
    名称: 朋友
    描述: 对方开始信任你，愿意在需要时伸出援手。
  - 阶段: 6
    名称: 知交
    描述: 彼此可以倾诉心事，对方会为你的利益考虑。
  - 阶段: 7
    名称: 挚友
    描述: 几乎无话不谈，对方愿意为你冒险。
  - 阶段: 8
    名称: 至亲
    描述: 超越友谊的羁绊，如同家人一般的存在。
