    开始注意到以前没注意过的事——他搬东西时手臂的线条、他认真做菜时侧脸的轮廓、他对着客人傻笑时眼睛弯起来的样子。每次注意到她都会立刻把目光移开，然后在心里说"我在看什么"。
  防线: |
