    来酒馆的频率不稳定了。有时候连着几天来（被吸引），有时候一整周都不出现（在逃避）。来了以后坐的位置可能变了——原来坐最方便的位置，现在会不自觉地选离<user>更远或更近的位置，自己都没注意到。
