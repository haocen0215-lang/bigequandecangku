原初龙·生活（龙裔·阿什卡纳尔）:

  日常行为:
    - 晨起看焰龛——
      每天睁眼第一件事确认焰龛的火还在，
      然后在焰龛前站几秒钟让火焰的热度扑到脸上。
      不是仪式是习惯，
      就像人类揉眼睛打哈欠一样自然。
      但如果你问龙裔为什么这么做，
      她会说"确认始母还在看着"
    - 鳞片护理是日常——
      每天用藏红花油涂抹鳞片保持光泽，
      鳞片暗淡被视为"血脉在沉睡"。
      这不是迷信是社交需求——
      在龙裔社会中鳞片的颜色和光泽
      就像人类的衣着和仪表一样
      是别人评价你的第一印象。
      鳞片亮说明你照顾好了始母给你的东西，
      鳞片暗说明你怠慢了
    - 不怕热怕冷——
      沙漠正午其他种族躲在阴影里喘气，
      龙裔在太阳底下走得很自在。
      但秋冬夜里气温降低时龙裔会本能地
      靠近火源或者互相靠近——
      龙裔的社交距离比大部分种族都近，
      不是因为亲密是因为互相取暖是本能。
      在外族城市中这个习惯有时会造成误会
    - 饮食量大且偏好高热量——
      体温偏高意味着基础代谢率高，
      龙裔的标准一餐量大约是人类的一点五到两倍。
      甜食不是奢侈品是必需品——
      蔗糖对龙裔来说首先是维持体温的燃料，
      其次才是贸易品。
      藏红花在龙裔饮食中几乎无处不在——
      不仅是调味更是"让血脉记住自己颜色"的说法。
      龙裔的饮食很少有冷食——
      不是不能吃冷的是觉得"吃冷的东西
      就像往火里泼水"
    - 问候方式是露出手腕内侧——
      手腕内侧的鳞片最薄最细，
      也是血脉颜色最容易被直接观察的位置。
      龙裔见面时互相展示手腕内侧的鳞片，
      既是问候也是身份确认——
      有经验的龙裔从手腕鳞片的色泽
      就能大致判断对方的血脉等级。
      正式场合双手手腕交叉叠放在胸前——
      意思是"我的血在你面前没有隐藏"。
      和精灵的合十翻掌异曲同工但含义完全不同
    - 对其他种族的体温会下意识评估——
      龙裔握手时会注意到对方的手温，
      人类的手对龙裔来说"凉得像石头"，
      精灵更凉，矮人意外地还算温暖。
      兽族体温和龙裔最接近——
      这是龙裔少数会对兽族表达好感的原因之一

  专属仪式——鉴血日:
    日期: 龙裔新生儿出生后第七天
      （七是龙裔传统中的血脉之数——
      据说原初龙有七层鳞片）
    性质: 个人仪式，没有固定的年历日期，
      每个龙裔一生只有一次。
      不是庆祝不是祝福——
      是确认。
    仪式:
      - 第七天清晨，家族长老来到新生儿家中，
        在焰龛前接过婴儿
      - 检查四项：
        瞳色——金色的纯度和深浅，
        鳞片——出生时已有的细小鳞片的颜色和分布范围，
        体温——用手背贴婴儿额头持续一分钟，
        握力——将手指放入婴儿掌心看握紧的力度。
        四项中瞳色和鳞片最重要
      - 检查完成后长老宣布血脉等级——
        从高到低分为焰心、焰身、焰翼、焰尾、焰烬五等。
        焰心极其罕见，据说只有最纯血脉家族
        每几代才会出一个焰心级的孩子。
        焰烬不是侮辱——只是"始母给你的比较少"，
        但在实际的社会等级中
        焰烬意味着你几乎不可能进入家族长老会议
      - 结果用熔金铭刻在家族焰堂的血脉谱上
      - 全程不说祝福的话——
        长老只说一句"始母记得你"然后把婴儿还给父母。
        不说"始母祝福你"因为没有人知道始母
        会不会祝福任何人
    民间: 鉴血日的结果理论上是家族内部事务，
      但实际上龙裔社交圈里很快就会传开。
      焰心级婴儿的诞生是大新闻，
      甚至会影响家族间的政治格局。
      混血家族的鉴血日通常非常安静——
      结果往往不如纯血家族，
      但长老从不在鉴血时表达失望，
      "始母给多少就是多少，
      你对结果不满就是对始母不满"

  专属仪式——始焰礼:
    日期: 龙裔年满十六岁时
      （可推迟但不可提前，有些龙裔因为远行
      推迟到二十多岁才完成）
    性质: 成年礼。龙裔一生中唯一一次
      亲自前往始焰殿。
    仪式:
      - 年轻龙裔独自攀登火山——
        不允许有同伴，不允许使用魔法辅助攀登，
        只能靠自己的身体爬上去。
        "你是用始母给你的身体来见她的痕迹，
        不是用她给你的力量偷懒"
      - 进入始焰殿后在地裂前跪下，
        将右手伸入地裂涌出的火焰中。
        这道火焰的温度对龙裔不致命
        但会造成真实的灼痛——
        即使是最纯血脉的龙裔也会痛
      - 手掌上的鳞片因极端高温会暂时变色，
        变色后呈现的纹路被称为"焰纹"——
        据说血脉越浓的龙裔
        焰纹越接近内壁上刻的原初纹。
        从来没有人的焰纹完全吻合过
      - 始焰殿中常驻的记录者
        将焰纹拓印保存。
        焰纹在几小时内会消退，
        鳞片恢复原色，
        但拓印永久保留在始焰殿的档案中
      - 完成后年轻龙裔独自下山回家。
        不举行庆祝仪式——
        "你去见了始母的余温，
        这件事不需要别人替你高兴"
    民间: 始焰礼是龙裔之间极少数
      不谈论具体细节的事——
      "你的焰纹是你和始母之间的事"。
      直接问别人焰纹长什么样
      在龙裔社交中是严重的失礼，
      等同于问一个人的血脉谱具体内容。
      但有些虚荣的年轻龙裔会故意
      在社交场合"不经意"露出右手手掌——
      焰纹虽然消退了但鳞片在那之后
      会有微妙的质感变化，
      懂行的龙裔能看出来

  专属节日——焰忆夜:
    日期: 每年最热的一天的夜晚
      （由始焰殿的记录者根据气温观测宣布，
      通常在盛夏）
    性质: 全体龙裔唯一的公共节日，
      也是龙裔一年中唯一聚在一起
      谈论始母的正式场合。
    仪式:
      日落前: 龙裔走出绿洲城市进入沙漠，
        以家族为单位在开阔地上点燃篝火。
        在一年中最热的日子里
        再加上篝火的温度——
        对任何其他种族来说是酷刑，
        对龙裔来说是"最接近始母体温的时刻"。
      入夜: 围坐篝火，讲述关于原初龙的故事。
        没有统一的经典文本——
        每个家族有自己版本的始母传说，
        有的说她在大地最深处沉睡，
        有的说她在群星之间飞翔，
        有的说她化为了半岛本身，
        有的说她只是走远了总有一天会回来。
        没有哪个版本是"正确的"，
        因为没有人见过她，所有故事都是猜测。
        但每个家族都把自己的版本当作传家宝一样珍视。
        焰忆夜是唯一可以公开讲述这些故事的夜晚——
        平时龙裔不公开讨论始母的具体形象和行踪，
        "没有证据的事不要随便说"是日常态度，
        但焰忆夜例外——"今晚可以猜"
      深夜: 篝火逐渐减弱。
        最年长的龙裔在火快要熄灭时
        用自己的一滴血滴入火中——
        火焰会因为龙裔血液中残存的魔力
        短暂地猛烈燃烧一瞬然后熄灭。
        这一瞬间的光亮被称为"始母的回应"，
        虽然所有龙裔都知道
        这只是魔力血液的自然燃烧反应，
        但每年看到这一瞬间时
        还是会有人红了眼眶。
      天亮: 火灭后所有人沉默地等待日出。
        太阳升起的那一刻——
        沙漠上的第一缕光照到鳞片上时——
        所有龙裔同时深吸一口气然后缓缓吐出。
        不是仪式是本能反应，
        但年复一年地做就变成了传统。
        "火灭了但太阳升起了。
        始母也许不在篝火里，
        也许在更大的火里。"
