耶梦加得·生活（拉弥亚）:

  日常行为:
    - 舌头感知一切——
      拉弥亚的舌头对气味的感知极其灵敏，
      这不只是生理特征更是宗教工具。
      每天早晨醒来第一件事是
      伸出舌头感知溶洞中空气的味道——
      硫磺味浓淡、水汽的方向、
      石灰岩的湿度变化。
      这些信息告诉拉弥亚
      "蜕祖今天的呼吸状态"——
      硫磺味重说明地热活跃"蜕祖体温升了"，
      水汽从深处涌上来说明"蜕祖在出汗"
    - 蜕皮周期支配生活节奏——
      每个拉弥亚都清楚自己的蜕皮周期，
      接近蜕皮的几天会变得安静内敛，
      食欲下降，活动减少，
      蛇身部分的旧鳞片开始发白发干。
      这段时间拉弥亚通常独处——
      "蜕皮是自己和蜕祖之间的事，
      不需要别人看着"。
      蜕完后精神和感官都达到巅峰，
      是拉弥亚一生中反复经历的高峰低谷循环
    - 居住越深越好——
      拉弥亚家庭选择溶洞时
      在条件允许的范围内尽量选深的。
      住在浅层溶洞不是羞耻但"离蜕祖远了"，
      住在最深处的家庭在社区中有微妙的威望——
      不是权力是一种"她们更认真"的印象
    - 见面问候是互相伸舌——
      两个拉弥亚见面时各自伸出舌头
      在对方脖子侧面附近快速掠过——
      不接触皮肤，只是捕捉气味。
      通过气味可以知道对方的健康状况、
      情绪状态、甚至蜕皮周期走到了哪一步。
      "你快蜕了"是一句中性的问候——
      不是打探隐私，是关心，
      因为快蜕皮的拉弥亚需要更多照顾
    - 饮食偏好洞穴食材——
      菌菇、盲鱼、暗河虾、根须果，
      拉弥亚的口味和暗精灵最接近——
      两者都依赖地下和阴暗环境的食材。
      溶洞蜂蜜是拉弥亚最珍贵的食材，
      甜度极高且带有矿物质的微苦回味，
      拉弥亚说"这是蜕祖的甜"

  专属仪式——蜕变礼:
    日期: 拉弥亚第一次蜕皮时
      （通常在十二到十五岁之间，个体差异很大）
    性质: 成年礼。
      不是人为安排的——
      没有人能决定自己什么时候第一次蜕皮，
      它来了就来了，
      "蜕祖决定你什么时候准备好"。
    仪式:
      - 当一个年轻拉弥亚感觉到第一次蜕皮即将来临
        （蛇身鳞片开始发白发干、食欲消失、
        舌头对气味的感知突然变得异常敏锐），
        她告诉族母，族母通知环洞
      - 年轻拉弥亚独自进入环洞最深处，
        在氏族壁画前盘起蛇身等待蜕皮自然发生。
        可能等几个小时，可能等一整天——
        "蜕祖不着急你也别急"
      - 蜕皮开始后不允许任何人帮忙——
        第一次蜕皮通常很痛很慢，
        旧皮一寸一寸裂开剥离，
        年轻拉弥亚可能会哭会喊，
        环洞外面等待的族人听得见但不能进去。
        "这是你和蜕祖之间的第一次对话，
        别人不能替你说话"
      - 蜕完后年轻拉弥亚自己拿着完整的第一张旧皮
        从环洞中走出来——
        如果旧皮在蜕的过程中撕碎了
        不是坏兆头只是说明"你蜕得太急了，
        下次慢一点"
      - 族母接过旧皮检查——
        旧皮的完整度、厚度、残留的鳞纹清晰度
        可以推断这个年轻拉弥亚的蜕皮周期倾向。
        周期短的被认为"蜕祖在你身上留的印记更深"
      - 第一张旧皮被卷成环形
        挂在年轻拉弥亚自己家的蜕龛中——
        从此她有了自己的蜕皮记录的第一个刻度
      - 族母宣布她的"蜕名"——
        和那伽的潮名、矮人的炉名类似，
        通常与第一次蜕皮的特征有关：
        "净蜕"表示旧皮完整无损蜕下——最佳结果，
        "裂蜕"表示旧皮中途撕裂——常见，无贬义，
        "长蜕"表示蜕皮过程持续了异常久——
        被认为"蜕祖和你说了很长的话"
    民间: 第一次蜕皮后的那顿饭是拉弥亚版的成年宴——
      全氏族共食，必须有溶洞蜂蜜，
      新成年的拉弥亚坐在最靠近环洞入口的位置，
      "刚从蜕祖那里回来的人离她最近"。
      这顿饭很安静——不是庄严是因为
      刚蜕完皮的拉弥亚通常累得说不动话

  专属节日——深寂夜:
    日期: 每年地震最频繁的时段结束后的第一个无震之夜
      （由大母蛇祭司根据地震观测宣布，
      日期每年不同，通常在冬末春初）
    性质: 全体拉弥亚唯一的公共节日，
      庆祝"蜕祖蜕完了这一轮皮，又安静了"。
    仪式:
      日落前: 所有拉弥亚回到自己所属的溶洞中，
        尽可能深入——
        不要求每个人都到大蜕穴，
        但至少要在自己氏族的环洞里。
        "蜕祖刚蜕完皮很累，
        你在她上面太远她听不到你"
      入夜: 大母蛇祭司在大蜕穴的蜕口旁
        将舌头伸入深坑上方的空气中，
        感知暗河水温和硫磺浓度的变化——
        如果水温比平时低、硫磺味比平时淡，
        说明蜕祖确实安静下来了，
        祭司宣布"蜕祖睡了"。
        消息通过各层溶洞的传声通道
        逐层向上传递到所有氏族。
      深夜: 所有拉弥亚在溶洞中安静地
        做同一件事——
        取出自己最近一次蜕下的旧皮，
        用舌头仔细感知上面残留的气味，
        然后把旧皮贴在溶洞的墙壁上——
        让旧皮和墙壁的石灰岩纹路重叠。
        "你的旧皮贴在她的旧皮上，
        你们是同一种东西做的"。
        保持这个姿势安静地待着，
        不说话不吃东西不移动，
        有些拉弥亚会在这个过程中睡着——
        "在蜕祖旁边睡着是最好的深寂夜"
      天亮: 晨光照不到溶洞深处，
        拉弥亚靠体感判断天亮——
        空气温度的微妙变化，
        从溶洞上方通道中传来的
        极其微弱的光线变化。
        起身后将旧皮放回蜕龛，
        然后全氏族共食早餐——
        深寂夜的早餐必须包含一种
        "从地下来的甜"——溶洞蜂蜜或根须果的糖浆。
        "蜕祖睡了一夜，
        我们也该醒来吃点甜的"
    民间: 深寂夜前后是拉弥亚一年中
      最安静最内省的几天。
      平时拉弥亚的性格其实相当直率甚至吵闹——
      但深寂夜前后她们会自发地降低声量，
      放慢动作，减少外出。
      "蜕祖刚睡下，别吵醒她"
      是半开玩笑半认真的说法。
      在纳维里斯等外族城市中生活的拉弥亚
      无法回到溶洞参加深寂夜，
      她们会在那天夜里找一个最安静的地方
      独自把旧皮贴在墙上——
      哪怕是旅馆的石墙也行，
      "蜕祖在每一块石头下面，
      不是只在我们的溶洞里"
